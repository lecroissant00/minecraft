<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Clone</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui">
        <div id="crosshair"></div>
        
        <div id="info-box">
            <p>Position: <span id="pos">0, 0, 0</span></p>
            <p>Block: <span id="selected-block">Dirt</span></p>
            <p id="controls">ZQSD: Mouvement | Souris: Regarder | Clic gauche: Détruire | Clic droit: Placer | Espace: Sauter (2x: Voler) | Roulette: Changer bloc</p>
        </div>
        
        <div id="hotbar">
            <div class="hotbar-slot selected" data-block="dirt" title="Dirt"></div>
            <div class="hotbar-slot" data-block="grass" title="Grass"></div>
            <div class="hotbar-slot" data-block="stone" title="Stone"></div>
            <div class="hotbar-slot" data-block="wood" title="Wood"></div>
            <div class="hotbar-slot" data-block="sand" title="Sand"></div>
            <div class="hotbar-slot" data-block="water" title="Water"></div>
            <div class="hotbar-slot" data-block="lava" title="Lava"></div>
            <div class="hotbar-slot" data-block="glass" title="Glass"></div>
            <div class="hotbar-slot" data-block="cobblestone" title="Cobblestone"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
